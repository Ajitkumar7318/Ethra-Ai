services:
  # ─── Backend Web Service ───────────────────────────────────────
  - type: web
    name: flowforge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure value
      - key: DATABASE_URL
        fromDatabase:
          name: flowforge-db
          property: connectionString

  # ─── Frontend Web Service ──────────────────────────────────────
  - type: web
    name: flowforge-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: flowforge-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL   # Uses backend's public URL

  # ─── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: flowforge-db
    plan: free
